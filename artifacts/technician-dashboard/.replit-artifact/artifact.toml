kind = "web"
previewPath = "/"
title = "Technician Dashboard"
version = "1.0.0"
id = "artifacts/technician-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25302

[services.development]
run = "pnpm --filter @workspace/technician-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/technician-dashboard", "run", "build" ]
publicDir = "artifacts/technician-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25302"
BASE_PATH = "/"
