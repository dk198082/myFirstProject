kind = "web"
previewPath = "/field-service-schedule-board/"
title = "Field Service Schedule Board"
version = "1.0.0"
id = "artifacts/field-service-schedule-board"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/field-service-schedule-board/" ]
localPort = 24240

[services.development]
run = "pnpm --filter @workspace/field-service-schedule-board run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/field-service-schedule-board", "run", "build" ]
publicDir = "artifacts/field-service-schedule-board/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24240"
BASE_PATH = "/field-service-schedule-board/"
