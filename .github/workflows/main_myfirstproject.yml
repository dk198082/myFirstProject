name: Build and deploy Node.js app to Azure Web App - myFirstProject

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
               version: 10.9.2
               run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
                node-version: 24
                cache: pnpm
                
      - name: Verify
        run: |
                  node -v
                  pnpm -v

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: node-app

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A70E402096D44CFF9FFDB218C329C3BC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C3A8B0CEC1EF4000BB4C9B3F4B827A39 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_65A61871FEFC4940A8C9D7C93787176C }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: myFirstProject
          slot-name: Production
          package: .
