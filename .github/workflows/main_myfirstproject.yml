# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - myFirstProject

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
         version: 10.9.2
         run_install: false

      - uses: actions/setup-node@v4
        with:
         node-version: 24
         cache: 'pnpm'

      - run: |
         node -v
         pnpm -v

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E8FEA789518E4A9F8E63ABD787ED9D2E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7B4187B3288D4A13888256571E2D5E84 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7A0047C178014CF1AE478B03E9BFABEC }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'myFirstProject'
          slot-name: 'Production'
          package: .
          
