<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Catalog — Field Service Application</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; color: #1e293b; display: flex; flex-direction: column; height: 100vh; }

  /* ── Header ── */
  .hdr { background: #0f172a; color: white; padding: 16px 24px; flex-shrink: 0; }
  .hdr h1 { font-size: 17px; font-weight: 700; }
  .hdr p { font-size: 12px; color: #94a3b8; margin-top: 3px; }
  .hdr-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .search-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 6px 12px; color: white; font-size: 13px; width: 260px; outline: none; }
  .search-box::placeholder { color: #64748b; }
  .search-box:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); }

  /* ── Layout ── */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar { width: 230px; flex-shrink: 0; background: #1e293b; overflow-y: auto; border-right: 1px solid #334155; }
  .sidebar-section { padding: 10px 12px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #64748b; }
  .sidebar-link { display: block; padding: 7px 16px; font-size: 12px; color: #94a3b8; text-decoration: none; border-left: 3px solid transparent; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-link:hover { color: #e2e8f0; background: rgba(255,255,255,0.05); }
  .sidebar-link.active { color: #60a5fa; border-left-color: #3b82f6; background: rgba(59,130,246,0.1); }
  .sidebar-badge { float: right; background: #334155; border-radius: 10px; padding: 1px 7px; font-size: 10px; color: #64748b; }

  /* ── Main content ── */
  .main { flex: 1; overflow-y: auto; padding: 24px; }
  .entity-block { background: white; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06); margin-bottom: 32px; overflow: hidden; scroll-margin-top: 16px; }

  /* ── Entity header ── */
  .entity-hdr { padding: 16px 20px; display: flex; align-items: flex-start; gap: 16px; }
  .entity-hdr-crm { background: linear-gradient(135deg, #1d4ed8, #2563eb); }
  .entity-hdr-public { background: linear-gradient(135deg, #047857, #059669); }
  .entity-hdr-app { background: linear-gradient(135deg, #0f766e, #0d9488); }
  .entity-title { color: white; }
  .entity-name { font-size: 15px; font-weight: 700; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; letter-spacing: -0.3px; }
  .entity-desc { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 4px; line-height: 1.5; }
  .entity-meta { margin-left: auto; text-align: right; flex-shrink: 0; }
  .entity-badge { display: inline-block; background: rgba(255,255,255,0.18); border-radius: 6px; padding: 3px 10px; font-size: 11px; color: rgba(255,255,255,0.9); font-family: monospace; }
  .entity-stats { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 5px; }

  /* ── Relations strip ── */
  .entity-rels { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 8px 20px; font-size: 11.5px; color: #64748b; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .entity-rels strong { color: #475569; margin-right: 4px; }
  .rel-pill { background: #e2e8f0; border-radius: 20px; padding: 2px 10px; font-size: 11px; color: #475569; font-family: monospace; }
  .rel-pill.cross { background: #fef3c7; color: #92400e; }

  /* ── Attribute table ── */
  .attr-table { width: 100%; border-collapse: collapse; }
  .attr-table thead th { padding: 9px 14px; background: #f8fafc; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #64748b; border-bottom: 1px solid #e2e8f0; text-align: left; }
  .attr-table tbody tr:hover { background: #f8fafc; }
  .attr-table tbody td { padding: 9px 14px; font-size: 12.5px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
  .attr-table tbody tr:last-child td { border-bottom: none; }

  .col-name { font-family: 'SF Mono','Fira Code',Consolas,monospace; font-size: 12px; }
  .col-name.pk { color: #1d4ed8; font-weight: 700; }
  .col-name.fk { color: #7c3aed; font-style: italic; }
  .col-name.calc { color: #0f766e; }
  .col-name.sys { color: #94a3b8; font-style: italic; }

  .badge { display: inline-block; border-radius: 4px; padding: 1px 7px; font-size: 10.5px; font-weight: 600; }
  .badge-pk { background: #dbeafe; color: #1d4ed8; }
  .badge-fk { background: #ede9fe; color: #6d28d9; }
  .badge-calc { background: #ccfbf1; color: #0f766e; }
  .badge-sys { background: #f1f5f9; color: #64748b; }
  .badge-uk { background: #fef9c3; color: #854d0e; }

  .col-type { font-family: 'SF Mono','Fira Code',Consolas,monospace; font-size: 11px; color: #64748b; }
  .col-nullable { font-size: 11px; }
  .nullable-yes { color: #94a3b8; }
  .nullable-no { color: #dc2626; font-weight: 600; }

  .col-biz { font-size: 12px; color: #475569; line-height: 1.6; }
  .col-biz code { background: #f1f5f9; border-radius: 3px; padding: 1px 5px; font-size: 11px; font-family: 'SF Mono','Fira Code',Consolas,monospace; color: #7c3aed; }
  .col-biz em { color: #64748b; font-style: italic; }

  /* search hide */
  .entity-block.hidden { display: none; }
  .attr-row.hidden { display: none; }

  /* ── TOC header ── */
  .toc-header { margin-bottom: 20px; }
  .toc-header h2 { font-size: 14px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 2px; }
  .toc-header p { font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <h1>Field Service Application — Data Catalog</h1>
      <p>All entities, attributes, types, and business logic across the CRM Mirror DB and App DB</p>
    </div>
    <input type="search" id="searchBox" class="search-box" placeholder="Search tables or columns…">
  </div>
</div>

<div class="body">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">CRM Mirror (crm.*)</div>
  </nav>

  <main class="main" id="main">
    <div class="toc-header">
      <h2>Data Catalog</h2>
      <p>Click any entity in the sidebar to jump to it. Hover column rows for additional context. Use the search box to filter by name.</p>
    </div>
  </main>
</div>

<script>

// ── DOM helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function roleBadge(r) {
  if (!r) return '';
  const map = { pk:'PK', fk:'FK', calc:'DERIVED', sys:'SYSTEM', uk:'UNIQUE' };
  const cls = { pk:'badge-pk', fk:'badge-fk', calc:'badge-calc', sys:'badge-sys', uk:'badge-uk' };
  if (!map[r]) return '';
  return `<span class="badge ${cls[r]}">${map[r]}</span>`;
}

// Build sidebar and entities
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main');

  const crmEntities = catalog.filter(e => e.schema === 'crm');
  const appEntities = catalog.filter(e => e.schema !== 'crm');

  // CRM section already has its label in HTML
  for (const e of crmEntities) {
    sidebar.insertAdjacentHTML('beforeend', `
      <a class="sidebar-link" data-target="${e.id}" onclick="scrollTo('${e.id}',this)">${esc(e.name)}<span class="sidebar-badge">${e.attrs.length}</span></a>
    `);
  }
  sidebar.insertAdjacentHTML('beforeend', `<div class="sidebar-section">App DB (public / app)</div>`);
  for (const e of appEntities) {
    sidebar.insertAdjacentHTML('beforeend', `
      <a class="sidebar-link" data-target="${e.id}" onclick="scrollTo('${e.id}',this)">${esc(e.name)}<span class="sidebar-badge">${e.attrs.length}</span></a>
    `);
  }

  // Build main content
  for (const e of catalog) {
    const hdrClass = e.schema === 'crm' ? 'entity-hdr-crm' : (e.schema === 'app' ? 'entity-hdr-app' : 'entity-hdr-public');
    const schemaLabel = `${e.schema}.*`;

    const refsHtml = e.refs.length ? e.refs.map(r => `<span class="rel-pill">${esc(r)}</span>`).join(' ') : '<em>none</em>';
    const refdByHtml = e.refdBy.length ? e.refdBy.map(r => {
      const cross = r.includes('cross-db');
      return `<span class="rel-pill ${cross?'cross':''}">${esc(r)}</span>`;
    }).join(' ') : '<em>none</em>';

    const rows = e.attrs.map(a => {
      const nameClass = a.r ? `col-name ${a.r}` : 'col-name';
      const bizHtml = a.biz ? a.biz : '<em style="color:#9ca3af">—</em>';
      const nullHtml = a.null === 'NO'
        ? '<span class="nullable-no">NOT NULL</span>'
        : '<span class="nullable-yes">nullable</span>';
      return `
        <tr class="attr-row" data-name="${esc(a.n.toLowerCase())}">
          <td><span class="${nameClass}">${esc(a.n)}</span></td>
          <td>${roleBadge(a.r)}</td>
          <td><span class="col-type">${esc(a.t)}</span></td>
          <td>${nullHtml}</td>
          <td class="col-biz">${bizHtml}</td>
        </tr>`;
    }).join('');

    main.insertAdjacentHTML('beforeend', `
      <div class="entity-block" id="entity-${e.id}">
        <div class="entity-hdr ${hdrClass}">
          <div class="entity-title">
            <div class="entity-name">${esc(e.name)}</div>
            <div class="entity-desc">${esc(e.desc)}</div>
          </div>
          <div class="entity-meta">
            <span class="entity-badge">${esc(schemaLabel)}</span>
            <div class="entity-stats">${e.attrs.length} attributes</div>
          </div>
        </div>
        <div class="entity-rels">
          <strong>References →</strong> ${refsHtml}
          &nbsp;&nbsp;<strong>Referenced by ←</strong> ${refdByHtml}
        </div>
        <table class="attr-table">
          <thead>
            <tr>
              <th style="width:200px">Column</th>
              <th style="width:80px">Role</th>
              <th style="width:130px">Type</th>
              <th style="width:90px">Nullable</th>
              <th>Description &amp; Business Logic</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `);
  }
}

function scrollTo(id, link) {
  document.getElementById('entity-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  link.classList.add('active');
}

// Search
document.getElementById('searchBox').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.entity-block').forEach(block => {
    const entityId = block.id.replace('entity-', '');
    const entity = catalog.find(e => e.id === entityId);
    if (!entity) return;
    const matchEntity = !q || entity.name.toLowerCase().includes(q) || entity.desc.toLowerCase().includes(q);
    let anyRowVisible = false;
    block.querySelectorAll('.attr-row').forEach(row => {
      const name = row.dataset.name || '';
      const biz = row.querySelector('.col-biz')?.textContent?.toLowerCase() || '';
      const visible = !q || matchEntity || name.includes(q) || biz.includes(q);
      row.classList.toggle('hidden', !visible);
      if (visible) anyRowVisible = true;
    });
    block.classList.toggle('hidden', !matchEntity && !anyRowVisible);
  });
});

// Scroll spy
const mainEl = document.getElementById('main');
mainEl.addEventListener('scroll', () => {
  const blocks = mainEl.querySelectorAll('.entity-block');
  let active = null;
  for (const b of blocks) {
    if (b.offsetTop - mainEl.scrollTop <= 80) active = b;
  }
  if (active) {
    const id = active.id.replace('entity-', '');
    document.querySelectorAll('.sidebar-link').forEach(l => {
      l.classList.toggle('active', l.dataset.target === id);
    });
  }
});

buildSidebar();
</script>
